<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden">

<div class="w-full mb-10 text-center relative">
<!-- Decorative Element (Academic North Star) -->
<div class="absolute -top-6 -left-4 w-24 h-24 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="mb-6 relative">
<div class="w-20 h-20 mx-auto rounded-xl bg-surface-container-high flex items-center justify-center overflow-hidden">

</div>
</div>

<p class="text-on-surface-variant font-body text-sm">Access your curated dashboard and student insights.</p>
</div>
<!-- Login Form Container -->
<section class="w-full space-y-6">
<!-- Input Fields -->
<div class="space-y-4">
<div class="relative">
<label class="block text-xs font-semibold text-outline mb-1.5 ml-1">School Email</label>
<div class="flex items-center bg-surface-container-highest rounded-xl px-4 py-4 transition-all focus-within:ring-2 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-outline mr-3" data-icon="mail">mail</span>
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-on-surface placeholder:text-outline/60 font-body text-sm" placeholder="e.g. name@academy.edu" type="email"/>
</div>
</div>
<div class="relative">
<div class="flex justify-between items-center mb-1.5 px-1">
<label class="block text-xs font-semibold text-outline">Password</label>
<a class="text-xs font-bold text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="flex items-center bg-surface-container-highest rounded-xl px-4 py-4 transition-all focus-within:ring-2 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-outline mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-on-surface placeholder:text-outline/60 font-body text-sm" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-outline ml-3 cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
</div>

<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-transform">

<div class="h-px bg-surface-container-high flex-grow"></div>
<span class="text-xs font-semibold text-outline/60 font-label">OR</span>
<div class="h-px bg-surface-container-high flex-grow"></div>
</div>
<!-- Social Provider -->
<button class="w-full py-4 bg-white border border-outline-variant/30 text-on-surface-variant font-body font-semibold rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors active:scale-95">

<p class="text-xs text-outline font-body text-center">

<a class="text-primary font-bold" href="#">Contact Institution Support</a>

<a class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-100 rounded-2xl px-6 py-2 transition-transform duration-200 active:scale-90" href="#">
